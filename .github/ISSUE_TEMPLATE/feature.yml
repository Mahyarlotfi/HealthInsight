name: Feature Request
description: Create a new feature or task for the project
title: "[Feature] "
labels: ["type:feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the purpose of this feature?
      placeholder: Describe the feature clearly.
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      description: List all tasks required to complete this feature.
      placeholder: |
        - [ ] Task 1
        - [ ] Task 2
        - [ ] Task 3

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define what must be true for this feature to be considered complete.
      placeholder: |
        - Criteria 1
        - Criteria 2

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - database
        - models
        - repository
        - service
        - cli
        - docs
